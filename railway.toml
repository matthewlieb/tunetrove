# https://docs.railway.app/reference/config-as-code
# Docker build: Nixpacks often fails on hatchling/pyproject wheels for this repo.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use Dockerfile CMD only. Railway was treating "PYTHONPATH=." as the executable name.
# PYTHONPATH is set in the Dockerfile (ENV PYTHONPATH=/app).
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
