# https://docs.railway.app/reference/config-as-code
# Docker build: Nixpacks often fails on hatchling/pyproject wheels for this repo.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Must NOT use "PYTHONPATH=. uvicorn …" — Railway parses that as an executable named "pythonpath=.".
# PYTHONPATH is already ENV in the Dockerfile. If this still fails, delete "Start Command" in the Railway UI.
startCommand = "uvicorn src.web.app:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
